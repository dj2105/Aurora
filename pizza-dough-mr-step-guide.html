<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pizza Dough MR Step Guide</title>
<style>
:root{--bg:#070a10;--ink:#f8fafc;--muted:#c9d2dd;--soft:rgba(255,255,255,.08);--accent:#ffb84d;--warn:#ffd0c7;--warn-bg:rgba(217,74,56,.18)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(255,184,77,.16),transparent 34%),linear-gradient(135deg,#060910,#171d28);color:var(--ink)}body{overflow:auto}.screen{min-height:100vh;width:100vw;display:grid;grid-template-rows:1fr;align-items:stretch}.instructionPage{min-height:100vh;width:100vw;padding:clamp(26px,5vw,82px);padding-left:clamp(120px,14vw,230px);padding-right:clamp(120px,14vw,230px);display:grid;grid-template-rows:auto auto 1fr auto;gap:clamp(16px,2.2vw,34px)}.meta{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;color:var(--muted)}.num{font-size:clamp(22px,3.2vw,54px);font-weight:950;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}.time{font-size:clamp(22px,3vw,50px);font-weight:950;color:var(--muted);white-space:nowrap}.title{margin:0;font-size:clamp(58px,11vw,172px);line-height:.86;letter-spacing:-.085em;font-weight:950}.instruction{align-self:center;font-size:clamp(44px,7.4vw,122px);line-height:.98;font-weight:850;letter-spacing:-.055em;max-width:1450px;text-wrap:balance}.note{font-size:clamp(26px,3.6vw,60px);line-height:1.08;font-weight:850;color:var(--warn);background:var(--warn-bg);border-left:12px solid #ff7a59;padding:clamp(16px,2vw,28px);max-width:1380px}.bigNav{position:fixed;top:50%;transform:translateY(-50%);z-index:20;border:0;border-radius:32px;padding:34px 20px;width:clamp(92px,10vw,170px);min-height:clamp(190px,30vh,360px);font-size:clamp(24px,3vw,48px);line-height:1;font-weight:950;color:white;background:rgba(255,255,255,.14);backdrop-filter:blur(16px);box-shadow:0 16px 60px rgba(0,0,0,.38);border:1px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;text-transform:uppercase;letter-spacing:.02em}.bigNav span{font-size:clamp(48px,7vw,100px);line-height:.7}.bigNav.prev{left:clamp(14px,2vw,34px)}.bigNav.next{right:clamp(14px,2vw,34px);background:rgba(255,184,77,.28)}.bigNav:active{transform:translateY(-50%) scale(.96)}.settings{min-height:72vh;padding:clamp(24px,4vw,60px);background:#101722;color:white;display:grid;gap:28px;align-content:start}.settings h2{margin:0;font-size:clamp(32px,4vw,64px);letter-spacing:-.05em}.controls{display:flex;align-items:center;gap:14px;flex-wrap:wrap}.controls button{border:0;border-radius:999px;padding:18px 28px;font-size:22px;font-weight:900;background:white;color:#101820;box-shadow:0 8px 28px rgba(0,0,0,.28)}.controls button.primary{background:var(--accent)}.controls button.dark{background:#273244;color:white}.bar{height:18px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#ffb84d,#ff7a59);transition:.25s}.voice{font-size:clamp(18px,2vw,30px);font-weight:850}.dot{display:inline-block;width:18px;height:18px;border-radius:50%;background:#8f98a3;margin-right:10px}.dot.on{background:#47d18c;box-shadow:0 0 0 8px rgba(71,209,140,.18)}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:rgba(16,24,32,.94);color:white;border-radius:999px;padding:13px 20px;font-size:18px;font-weight:850;opacity:0;transition:.2s;z-index:30}.toast.show{opacity:1}.immersive .settings{display:none}.immersive body{cursor:none}@media(max-width:800px){.instructionPage{padding:24px;padding-left:92px;padding-right:92px}.meta{flex-direction:column;gap:8px}.time{white-space:normal}.settings{min-height:90vh}.controls button{font-size:18px;padding:14px 20px}.bigNav{width:74px;min-height:180px;border-radius:24px;font-size:18px;padding:24px 10px}.bigNav span{font-size:44px}.bigNav.prev{left:8px}.bigNav.next{right:8px}}
</style>
</head>
<body>
<button id="bigPrev" class="bigNav prev" aria-label="Previous step"><span>‹</span>Prev</button>
<button id="bigNext" class="bigNav next" aria-label="Next step"><span>›</span>Next</button>
<div class="screen" role="application" aria-label="Pizza dough step guide">
<section class="instructionPage" aria-live="polite">
<div class="meta"><div id="num" class="num"></div><div id="time" class="time"></div></div>
<h1 id="title" class="title"></h1>
<div id="instruction" class="instruction"></div>
<div id="note" class="note"></div>
</section>
<section class="settings" aria-label="Controls and settings">
<h2>Controls</h2>
<div class="bar"><div id="fill" class="fill"></div></div>
<div class="controls"><button id="back">Back</button><button id="repeat">Repeat</button><button id="next" class="primary">Next</button><button id="voice">Voice</button><button id="fullscreen" class="dark">Full screen</button><button id="immersive" class="dark">Immersive</button></div>
<div class="voice"><span id="dot" class="dot"></span><span id="voiceStatus">Voice off</span></div>
<div class="hint">Large side buttons are always available for Quest hand tracking. Voice is retained for browsers that support it, but it is not required.</div>
<div class="hint">Keyboard: right arrow for next, left arrow for back, space to repeat, F for full screen, I for immersive, V for voice.</div>
</section>
</div>
<div id="toast" class="toast"></div>
<script>
const steps=[
{t:'Gather everything',m:'5 minutes',i:'Measure five hundred grams of strong white bread flour, one sachet of dried yeast, one teaspoon of salt, three hundred and twenty five millilitres of warm water, and one tablespoon of olive oil.',n:'Check the water now. It should feel warm on your finger, not hot.'},
{t:'Set up the oven',m:'5 minutes',i:'Turn the oven to its highest setting, ideally two hundred and twenty to two hundred and fifty degrees Celsius. Put the baking tray in the oven now so it gets properly hot.',n:'Doing this early prevents the dough being ready before the oven is hot.'},
{t:'Mix dry ingredients',m:'1 minute',i:'Put the flour into a large bowl. Add the yeast and salt. Stir them together thoroughly before adding any water.',n:'Mixing first stops concentrated salt sitting directly on the yeast.'},
{t:'Make rough dough',m:'2 minutes',i:'Pour in the warm water and olive oil. Stir until no dry flour remains. The dough should look rough and shaggy, not smooth yet.',n:'Do not add extra flour just because it looks untidy at this stage.'},
{t:'Knead',m:'8 minutes',i:'Tip the dough onto a lightly floured surface. Push it away, fold it back, turn it slightly, and repeat until smooth and elastic.',n:'If it sticks badly, add flour only a tiny pinch at a time. Too much flour makes dry dough.'},
{t:'Check the dough',m:'30 seconds',i:'Press the dough gently with one finger. It should spring back slowly and feel slightly tacky, but not gluey or wet.',n:'Springy dough is a good sign. It means the gluten has developed.'},
{t:'First rise',m:'1 to 2 hours',i:'Put the dough back in the bowl. Cover it. Leave it somewhere warm until it has roughly doubled in size.',n:'If the room is cold, give it more time. Slow rising is not failure.'},
{t:'Divide gently',m:'2 minutes',i:'Tip the risen dough onto the work surface. Cut it into two equal pieces. Shape each piece into a loose ball.',n:'Do not knead it again. Too much handling now makes it tight and springy.'},
{t:'Rest dough balls',m:'15 minutes',i:'Cover the two dough balls and leave them alone for fifteen minutes.',n:'This is the step that prevents the dough fighting you and shrinking back.'},
{t:'Shape the bases',m:'5 minutes',i:'Press each dough ball from the centre outwards. Stretch gradually into a pizza base. Work gently and keep some air in the edge.',n:'If it contracts, stop. Cover it and rest it for another ten minutes, then continue.'},
{t:'Top the pizzas',m:'5 minutes',i:'Spread a thin layer of tomato sauce. Add mozzarella. Scatter over cooked mushrooms and pancetta. Leave a small clean border for the crust.',n:'Do not add rocket yet. Rocket goes on after baking.'},
{t:'Bake',m:'10 to 12 minutes',i:'Carefully place the pizza onto the hot tray. Bake until the edges are golden, the cheese is bubbling, and the base looks crisp.',n:'The tray is hot. Use oven gloves and move slowly.'},
{t:'Finish',m:'1 minute',i:'Take the pizza out of the oven. Scatter fresh rocket over the top. Add parmesan, olive oil, balsamic, or black pepper if you want.',n:'Let it stand for one minute before slicing so the toppings settle.'}
];
let idx=0,rec=null,voiceOn=false,immersiveOn=false;const $=id=>document.getElementById(id);function show(){let s=steps[idx];$('num').textContent='Step '+(idx+1)+' of '+steps.length;$('title').textContent=s.t;$('time').textContent=s.m;$('instruction').textContent=s.i;$('note').textContent=s.n;$('fill').style.width=((idx+1)/steps.length*100)+'%';document.title='Step '+(idx+1)+': '+s.t;window.scrollTo({top:0,left:0,behavior:'instant'})}function toast(x){$('toast').textContent=x;$('toast').classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>$('toast').classList.remove('show'),1500)}function next(){idx<steps.length-1?(idx++,show(),toast('Step '+(idx+1))):toast('Last step')}function back(){idx>0?(idx--,show(),toast('Step '+(idx+1))):toast('First step')}function repeat(){show();toast('Repeating step '+(idx+1))}function startOver(){idx=0;show();toast('Starting over')}async function fullScreen(){try{if(!document.fullscreenElement){await document.documentElement.requestFullscreen();toast('Full screen on')}else{await document.exitFullscreen();toast('Full screen off')}}catch(e){toast('Full screen not available here')}}function immersive(){immersiveOn=!immersiveOn;document.documentElement.classList.toggle('immersive',immersiveOn);if(immersiveOn){if(!document.fullscreenElement)fullScreen();toast('Immersive mode on')}else{toast('Immersive mode off')}show()}function command(raw){let x=raw.toLowerCase();if(x.includes('next')||x.includes('forward')||x.includes('continue'))next();else if(x.includes('back')||x.includes('previous'))back();else if(x.includes('repeat')||x.includes('again'))repeat();else if(x.includes('full screen')||x.includes('fullscreen'))fullScreen();else if(x.includes('immersive'))immersive();else if(x.includes('start over')||x.includes('restart')||x.includes('beginning'))startOver();else toast('Heard: '+raw)}function voice(){voiceOn?stopVoice():startVoice()}function startVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Voice not supported in this browser');$('voiceStatus').textContent='Voice unsupported';return}rec=new SR();rec.lang='en-GB';rec.continuous=true;rec.interimResults=false;rec.onstart=()=>{voiceOn=true;$('dot').classList.add('on');$('voiceStatus').textContent='Voice listening';toast('Voice commands on')};rec.onresult=e=>{let r=e.results[e.results.length-1];if(r&&r[0])command(r[0].transcript)};rec.onerror=e=>toast('Voice issue: '+e.error);rec.onend=()=>{if(voiceOn){try{rec.start()}catch(e){}}};try{rec.start()}catch(e){toast('Could not start voice')}}function stopVoice(){voiceOn=false;$('dot').classList.remove('on');$('voiceStatus').textContent='Voice off';if(rec)rec.stop();toast('Voice commands off')}document.getElementById('next').onclick=next;document.getElementById('back').onclick=back;document.getElementById('repeat').onclick=repeat;document.getElementById('voice').onclick=voice;document.getElementById('fullscreen').onclick=fullScreen;document.getElementById('immersive').onclick=immersive;document.getElementById('bigNext').onclick=next;document.getElementById('bigPrev').onclick=back;window.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='Left'||e.key==='ArrowLeft')back();if(e.code==='Space'){e.preventDefault();repeat()}if(e.key.toLowerCase()==='v')voice();if(e.key.toLowerCase()==='f')fullScreen();if(e.key.toLowerCase()==='i'||e.key==='Escape'){if(immersiveOn)immersive();else if(e.key.toLowerCase()==='i')immersive()}});show();
</script>
</body>
</html>
