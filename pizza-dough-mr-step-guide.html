<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pizza Dough MR Step Guide</title>
<style>
:root{--bg:rgba(8,11,16,.78);--card:rgba(255,255,255,.94);--ink:#101820;--muted:#52606d;--accent:#ffb84d;--warn:#d94a38}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(255,184,77,.22),transparent 38%),linear-gradient(135deg,#070a10,#1b2230);color:var(--ink)}body{display:grid;place-items:center;padding:24px}.app{width:min(1450px,96vw);height:min(900px,94vh);display:grid;grid-template-rows:auto 1fr auto;gap:18px}header,footer{border:1px solid rgba(255,255,255,.22);border-radius:26px;background:rgba(255,255,255,.16);color:white;padding:18px 26px;backdrop-filter:blur(18px);box-shadow:0 20px 70px rgba(0,0,0,.35)}header{display:flex;justify-content:space-between;align-items:center;gap:20px}h1{font-size:clamp(28px,4vw,58px);line-height:.95;margin:0;letter-spacing:-.05em}.sub{opacity:.78;font-size:clamp(14px,1.2vw,19px)}.voice{font-weight:800;font-size:clamp(14px,1.25vw,20px);white-space:nowrap}.dot{display:inline-block;width:14px;height:14px;border-radius:50%;background:#8f98a3;margin-right:10px}.dot.on{background:#47d18c;box-shadow:0 0 0 8px rgba(71,209,140,.18)}main{position:relative;overflow:hidden;border-radius:36px;background:var(--card);box-shadow:0 26px 90px rgba(0,0,0,.38);border:1px solid rgba(255,255,255,.55)}.bar{height:11px;background:rgba(0,0,0,.1)}.fill{height:100%;width:0;background:linear-gradient(90deg,#ffb84d,#ff7a59);transition:.25s}.step{height:calc(100% - 11px);display:grid;grid-template-rows:auto 1fr auto;gap:18px;padding:clamp(28px,5vw,78px)}.top{display:flex;justify-content:space-between;gap:20px}.num{font-size:clamp(18px,2vw,34px);font-weight:950;letter-spacing:.08em;color:#8b4a00;text-transform:uppercase}.time{font-size:clamp(18px,1.8vw,32px);font-weight:900;color:var(--muted);background:rgba(255,184,77,.2);padding:10px 18px;border-radius:999px;white-space:nowrap}h2{margin:4px 0 0;font-size:clamp(44px,7.8vw,118px);line-height:.9;letter-spacing:-.075em}.instruction{align-self:center;font-size:clamp(30px,4.7vw,74px);line-height:1.05;font-weight:820;letter-spacing:-.045em;max-width:1180px}.note{font-size:clamp(22px,2.4vw,40px);line-height:1.12;font-weight:800;color:var(--warn);background:rgba(217,74,56,.11);border-left:10px solid var(--warn);border-radius:20px;padding:18px 22px}.controls{display:flex;justify-content:center;align-items:center;gap:12px;flex-wrap:wrap}button{border:0;border-radius:999px;padding:15px 22px;font-size:20px;font-weight:900;background:rgba(255,255,255,.94);color:var(--ink);box-shadow:0 8px 28px rgba(0,0,0,.22)}button.primary{background:var(--accent)}button:active{transform:scale(.97)}footer{display:grid;grid-template-columns:1fr auto 1fr;align-items:center}.hint{font-size:clamp(13px,1.15vw,18px);opacity:.86}.right{text-align:right}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:rgba(16,24,32,.94);color:white;border-radius:999px;padding:13px 20px;font-size:18px;font-weight:850;opacity:0;transition:.2s}.toast.show{opacity:1}@media(max-width:800px){body{padding:10px}.app{height:97vh}header{align-items:flex-start;flex-direction:column}footer{grid-template-columns:1fr;text-align:center}.right{text-align:center}button{font-size:17px;padding:13px 17px}}
</style>
</head>
<body>
<div class="app" role="application" aria-label="Pizza dough step guide">
<header><div><h1>Pizza Dough Guide</h1><div class="sub">Large mixed reality step cards for Meta Quest 3</div></div><div class="voice"><span id="dot" class="dot"></span><span id="voiceStatus">Voice off</span></div></header>
<main><div class="bar"><div id="fill" class="fill"></div></div><section class="step"><div class="top"><div><div id="num" class="num"></div><h2 id="title"></h2></div><div id="time" class="time"></div></div><div id="instruction" class="instruction"></div><div id="note" class="note"></div></section></main>
<footer><div class="hint">Say: next, back, repeat, or start over.</div><div class="controls"><button id="back">Back</button><button id="repeat">Repeat</button><button id="next" class="primary">Next</button><button id="voice">Voice</button></div><div class="hint right">Keyboard: arrows. Space repeats.</div></footer>
</div><div id="toast" class="toast"></div>
<script>
const steps=[
{t:'Gather everything',m:'5 minutes',i:'Measure five hundred grams of strong white bread flour, one sachet of dried yeast, one teaspoon of salt, three hundred and twenty five millilitres of warm water, and one tablespoon of olive oil.',n:'Check the water now. It should feel warm on your finger, not hot.'},
{t:'Set up the oven',m:'5 minutes',i:'Turn the oven to its highest setting, ideally two hundred and twenty to two hundred and fifty degrees Celsius. Put the baking tray in the oven now so it gets properly hot.',n:'Doing this early prevents the dough being ready before the oven is hot.'},
{t:'Mix dry ingredients',m:'1 minute',i:'Put the flour into a large bowl. Add the yeast and salt. Stir them together thoroughly before adding any water.',n:'Mixing first stops concentrated salt sitting directly on the yeast.'},
{t:'Make rough dough',m:'2 minutes',i:'Pour in the warm water and olive oil. Stir until no dry flour remains. The dough should look rough and shaggy, not smooth yet.',n:'Do not add extra flour just because it looks untidy at this stage.'},
{t:'Knead',m:'8 minutes',i:'Tip the dough onto a lightly floured surface. Push it away, fold it back, turn it slightly, and repeat until smooth and elastic.',n:'If it sticks badly, add flour only a tiny pinch at a time. Too much flour makes dry dough.'},
{t:'Check the dough',m:'30 seconds',i:'Press the dough gently with one finger. It should spring back slowly and feel slightly tacky, but not gluey or wet.',n:'Springy dough is a good sign. It means the gluten has developed.'},
{t:'First rise',m:'1 to 2 hours',i:'Put the dough back in the bowl. Cover it. Leave it somewhere warm until it has roughly doubled in size.',n:'If the room is cold, give it more time. Slow rising is not failure.'},
{t:'Divide gently',m:'2 minutes',i:'Tip the risen dough onto the work surface. Cut it into two equal pieces. Shape each piece into a loose ball.',n:'Do not knead it again. Too much handling now makes it tight and springy.'},
{t:'Rest dough balls',m:'15 minutes',i:'Cover the two dough balls and leave them alone for fifteen minutes.',n:'This is the step that prevents the dough fighting you and shrinking back.'},
{t:'Shape the bases',m:'5 minutes',i:'Press each dough ball from the centre outwards. Stretch gradually into a pizza base. Work gently and keep some air in the edge.',n:'If it contracts, stop. Cover it and rest it for another ten minutes, then continue.'},
{t:'Top the pizzas',m:'5 minutes',i:'Spread a thin layer of tomato sauce. Add mozzarella. Scatter over cooked mushrooms and pancetta. Leave a small clean border for the crust.',n:'Do not add rocket yet. Rocket goes on after baking.'},
{t:'Bake',m:'10 to 12 minutes',i:'Carefully place the pizza onto the hot tray. Bake until the edges are golden, the cheese is bubbling, and the base looks crisp.',n:'The tray is hot. Use oven gloves and move slowly.'},
{t:'Finish',m:'1 minute',i:'Take the pizza out of the oven. Scatter fresh rocket over the top. Add parmesan, olive oil, balsamic, or black pepper if you want.',n:'Let it stand for one minute before slicing so the toppings settle.'}
];
let idx=0,rec=null,voiceOn=false;const $=id=>document.getElementById(id);function show(){let s=steps[idx];$('num').textContent='Step '+(idx+1)+' of '+steps.length;$('title').textContent=s.t;$('time').textContent=s.m;$('instruction').textContent=s.i;$('note').textContent=s.n;$('fill').style.width=((idx+1)/steps.length*100)+'%';document.title='Step '+(idx+1)+': '+s.t}function toast(x){$('toast').textContent=x;$('toast').classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>$('toast').classList.remove('show'),1500)}function next(){idx<steps.length-1?(idx++,show(),toast('Step '+(idx+1))):toast('Last step')}function back(){idx>0?(idx--,show(),toast('Step '+(idx+1))):toast('First step')}function repeat(){show();toast('Repeating step '+(idx+1))}function startOver(){idx=0;show();toast('Starting over')}function command(raw){let x=raw.toLowerCase();if(x.includes('next')||x.includes('forward')||x.includes('continue'))next();else if(x.includes('back')||x.includes('previous'))back();else if(x.includes('repeat')||x.includes('again'))repeat();else if(x.includes('start over')||x.includes('restart')||x.includes('beginning'))startOver();else toast('Heard: '+raw)}function voice(){voiceOn?stopVoice():startVoice()}function startVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Voice not supported in this browser');$('voiceStatus').textContent='Voice unsupported';return}rec=new SR();rec.lang='en-GB';rec.continuous=true;rec.interimResults=false;rec.onstart=()=>{voiceOn=true;$('dot').classList.add('on');$('voiceStatus').textContent='Voice listening';toast('Voice commands on')};rec.onresult=e=>{let r=e.results[e.results.length-1];if(r&&r[0])command(r[0].transcript)};rec.onerror=e=>toast('Voice issue: '+e.error);rec.onend=()=>{if(voiceOn){try{rec.start()}catch(e){}}};try{rec.start()}catch(e){toast('Could not start voice')}}function stopVoice(){voiceOn=false;$('dot').classList.remove('on');$('voiceStatus').textContent='Voice off';if(rec)rec.stop();toast('Voice commands off')}document.getElementById('next').onclick=next;document.getElementById('back').onclick=back;document.getElementById('repeat').onclick=repeat;document.getElementById('voice').onclick=voice;window.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')back();if(e.code==='Space'){e.preventDefault();repeat()}if(e.key.toLowerCase()==='v')voice()});show();
</script>
</body>
</html>
